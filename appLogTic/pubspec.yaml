name: logtic
description: LogTic - Gestión de Rutas Inteligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2
  
  # Location & Maps
  geolocator: ^13.0.1
  url_launcher: ^6.3.1
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  
  # Image handling
  image_picker: ^1.1.2
  
  # Storage
  shared_preferences: ^2.3.3
  
  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  
  # Utilities
  path_provider: ^2.1.4
  crypto: ^3.0.6
  uuid: ^4.5.1
  mime: ^2.0.0
  open_file: ^3.5.7
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/