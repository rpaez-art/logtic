name: logtic
description: LogTic - Gestión de Rutas Inteligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2
  
  # Location & Maps
  geolocator: ^14.0.3
  url_launcher: ^6.3.1
  
  # Firebase
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  
  # Image handling
  image_picker: ^1.1.2
  
  # Storage
  shared_preferences: ^2.3.3
  sqflite: ^2.4.1
  path: ^1.9.0
  
  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  intl: ^0.20.3
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  
  # Navigation
  go_router: ^14.8.0
  
  # Utilities
  path_provider: ^2.1.4
  crypto: ^3.0.6
  uuid: ^4.5.1
  mime: ^2.0.0
  open_file: ^4.0.0
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/